version: '3.9'

services:
  fastapi:
    build: .
    container_name: aqi-predictor-api
    command: python main.py --api fastapi
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT_FASTAPI=8000
      - LOGGING_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    restart: unless-stopped

  streamlit:
    build: .
    container_name: aqi-predictor-dashboard
    command: streamlit run src/apps/dashboard.py --server.port=8501
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    depends_on:
      - fastapi
    restart: unless-stopped

volumes:
  aqi_data:
  aqi_models:
